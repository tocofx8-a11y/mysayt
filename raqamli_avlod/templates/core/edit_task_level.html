{% extends "base.html" %}
{% block title %}Topshiriq — {{ lesson.title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;">
    <h2>2-qism: {{ task_level.get_level_display }} daraja ({{ task_level.max_score }} ball)</h2>
    <p>{{ lesson.title }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Saqlash</button>
        <a href="{% url 'lesson_detail' lesson.id %}">Bekor qilish</a>
    </form>
</div>
{% endblock %}
