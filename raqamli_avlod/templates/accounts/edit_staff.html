{% extends "base.html" %}
{% block title %}Tahrirlash — {{ staff.get_full_name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
    <h2>{{ staff.get_role_display }}ni tahrirlash</h2>
    <p><small>Login: {{ staff.username }}</small></p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Saqlash</button>
        <a href="{% url 'superadmin_dashboard' %}">Bekor qilish</a>
    </form>
</div>
{% endblock %}
